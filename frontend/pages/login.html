<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Coração Animal</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:1rem; }
    .login-card { background:var(--bg-card);border:1px solid var(--border);border-radius:1.5rem;padding:2.5rem;width:100%;max-width:420px;animation:fadeUp .5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
    .login-logo { display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:2rem; }
    .login-logo-icon { width:48px;height:48px;background:var(--laranja);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px; }
    .login-logo-text { font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text); }
    .login-title { font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);text-align:center;margin-bottom:4px; }
    .login-sub { font-size:14px;color:var(--text-sec);text-align:center;margin-bottom:1.5rem;font-family:'DM Sans',sans-serif; }
    /* Login message (from redirect) */
    .login-msg { display:none;background:rgba(224,92,42,0.08);border:1px solid rgba(224,92,42,0.25);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--laranja);margin-bottom:1rem;text-align:center;font-family:'DM Sans',sans-serif; }
    .login-msg.visible { display:block; }
    /* Tabs */
    .login-tabs { display:flex;background:var(--bg-muted);border-radius:50px;padding:4px;margin-bottom:1.5rem;gap:4px; }
    .login-tab { flex:1;padding:8px;border:none;border-radius:50px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;background:transparent;color:var(--text-sec);transition:var(--transition); }
    .login-tab.active { background:var(--bg-card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1); }
    /* Form fields */
    .form-grupo { margin-bottom:1rem; }
    .form-grupo label { display:block;font-size:13px;font-weight:500;color:var(--text-sec);margin-bottom:6px;font-family:'DM Sans',sans-serif; }
    .input-wrap { position:relative; }
    .input-icon { position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none; }
    .form-grupo input { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 42px;font-size:14px;color:var(--text);outline:none;transition:var(--transition);font-family:'DM Sans',sans-serif; }
    .form-grupo input:focus { border-color:var(--laranja);box-shadow:0 0 0 3px rgba(224,92,42,.12); }
    .form-grupo input.invalid { border-color:#e53935;box-shadow:0 0 0 3px rgba(229,57,53,.1); }
    .btn-eye { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--text-muted);padding:4px;transition:var(--transition); }
    /* Error */
    .login-error { display:none;background:rgba(229,57,53,.08);border:1px solid rgba(229,57,53,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#e53935;margin-bottom:1rem;text-align:center;font-family:'DM Sans',sans-serif; }
    .login-error.visible { display:block; }
    /* Submit */
    .btn-login { width:100%;background:var(--laranja);color:white;border:none;border-radius:50px;padding:13px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:.5rem; }
    .btn-login:hover { background:var(--laranja-hover);transform:translateY(-1px); }
    .btn-login:disabled { background:var(--bg-muted);color:var(--text-muted);cursor:not-allowed;transform:none; }
    .btn-spinner { display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    /* Hint */
    .login-hint { margin-top:1.5rem;padding:12px 16px;background:var(--bg-muted);border-radius:10px;font-size:12px;color:var(--text-muted);text-align:center;font-family:'DM Sans',sans-serif;line-height:1.7; }
    .login-hint strong { color:var(--text-sec); }
    .login-back { display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1.25rem;font-size:13px;color:var(--text-muted);text-decoration:none;font-family:'DM Sans',sans-serif;transition:var(--transition); }
    .login-back:hover { color:var(--laranja); }
    .theme-btn { position:fixed;top:1rem;right:1rem;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--bg-muted);color:var(--text-sec);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition); }
  </style>
</head>
<body>

<button class="theme-btn" onclick="alternarTema()"><span id="temaIcone">🌙</span></button>

<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-icon">🐾</div>
    <div class="login-logo-text">Coração Animal</div>
  </div>
  <div class="login-title">Bem-vindo de volta</div>
  <div class="login-sub">Faça login para continuar</div>

  <!-- Message from redirect -->
  <div class="login-msg" id="loginMsg"></div>

  <!-- Tabs -->
  <div class="login-tabs">
    <button class="login-tab active" id="tabUser"  onclick="switchTab('user')">👤 Usuário</button>
    <button class="login-tab"        id="tabAdmin" onclick="switchTab('admin')">⚙ Admin</button>
  </div>

  <!-- Error -->
  <div class="login-error" id="loginError">❌ Usuário ou senha incorretos</div>

  <!-- Username -->
  <div class="form-grupo">
    <label for="inputUsername">Usuário</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input type="text" id="inputUsername" placeholder="Digite seu usuário"
        onkeydown="if(event.key==='Enter') handleLogin()"/>
    </div>
  </div>

  <!-- Password -->
  <div class="form-grupo">
    <label for="inputPassword">Senha</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="inputPassword" placeholder="Digite sua senha"
        onkeydown="if(event.key==='Enter') handleLogin()"/>
      <button class="btn-eye" onclick="togglePassword()" type="button">
        <span id="eyeIcon">👁️</span>
      </button>
    </div>
  </div>

  <button class="btn-login" id="btnLogin" onclick="handleLogin()">
    <div class="btn-spinner" id="loginSpinner"></div>
    <span id="loginBtnText">Entrar</span>
  </button>

  <div class="login-hint" id="loginHint">
    🔑 <strong>Usuário:</strong> usuario &nbsp;|&nbsp; <strong>Senha:</strong> coracao123
  </div>

  <a href="../index.html" class="login-back">← Voltar ao site</a>
</div>

<script src="../js/auth.js"></script>
<script src="../js/tema.js"></script>
<script src="../js/notifications.js"></script>
<script>
  let currentTab = 'user';

  // Show login message if redirected here
  function init() {
    const msg = localStorage.getItem('ca_login_msg');
    if (msg) {
      const el = document.getElementById('loginMsg');
      el.textContent = '🔒 ' + msg;
      el.classList.add('visible');
      localStorage.removeItem('ca_login_msg');
    }

    // If already logged in, redirect
    if (isLoggedIn()) {
      redirectAfterLogin();
    }
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabUser').classList.toggle('active', tab === 'user');
    document.getElementById('tabAdmin').classList.toggle('active', tab === 'admin');

    const hint = document.getElementById('loginHint');
    hint.innerHTML = tab === 'admin'
      ? '🔑 <strong>Usuário:</strong> admin &nbsp;|&nbsp; <strong>Senha:</strong> coracao2025'
      : '🔑 <strong>Usuário:</strong> usuario &nbsp;|&nbsp; <strong>Senha:</strong> coracao123';

    // Clear fields & errors
    document.getElementById('inputUsername').value = '';
    document.getElementById('inputPassword').value = '';
    document.getElementById('loginError').classList.remove('visible');
  }

  function handleLogin() {
    const username = document.getElementById('inputUsername').value.trim();
    const password = document.getElementById('inputPassword').value;
    const errorEl  = document.getElementById('loginError');
    const btn      = document.getElementById('btnLogin');
    const spinner  = document.getElementById('loginSpinner');
    const btnText  = document.getElementById('loginBtnText');

    // Clear errors
    errorEl.classList.remove('visible');
    document.getElementById('inputUsername').classList.remove('invalid');
    document.getElementById('inputPassword').classList.remove('invalid');

    if (!username || !password) {
      errorEl.textContent = '❌ Preencha o usuário e a senha';
      errorEl.classList.add('visible');
      if (!username) document.getElementById('inputUsername').classList.add('invalid');
      if (!password) document.getElementById('inputPassword').classList.add('invalid');
      return;
    }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Verificando...';

    setTimeout(() => {
      const result = attemptLogin(username, password, currentTab);

      if (result.success) {
        btnText.textContent = '✓ Entrando...';
        showNotification('Login realizado com sucesso!', 'success', 1500);
        setTimeout(() => redirectAfterLogin(), 800);
      } else {
        spinner.style.display = 'none';
        btn.disabled = false;
        btnText.textContent = 'Entrar';
        errorEl.textContent = '❌ Usuário ou senha incorretos';
        errorEl.classList.add('visible');
        document.getElementById('inputPassword').value = '';
        document.getElementById('inputPassword').classList.add('invalid');
        document.getElementById('inputPassword').focus();
      }
    }, 700);
  }

  /**
   * Redirects after successful login.
   * Priority: saved redirect → admin panel → index
   */
  function redirectAfterLogin() {
    const saved = localStorage.getItem('ca_redirect');
    localStorage.removeItem('ca_redirect');

    if (currentTab === 'admin' || isAdmin()) {
      window.location.href = saved || 'admin.html';
    } else {
      // FIX: always redirect to index.html after user login
      window.location.href = saved || '../index.html';
    }
  }

  function togglePassword() {
    const input = document.getElementById('inputPassword');
    const icon  = document.getElementById('eyeIcon');
    input.type  = input.type === 'password' ? 'text' : 'password';
    icon.textContent = input.type === 'password' ? '👁️' : '🙈';
  }

  init();
</script>
</body>
</html>
